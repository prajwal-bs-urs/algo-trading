name: Portfolio Automation

on:
  schedule:
    - cron: '05 11 * * 1-5'
    - cron: '10 11 28-31 * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests python-dotenv matplotlib

      - name: Run daily tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python portfolio_tracker.py

      - name: Run monthly report if last day
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monthly_report.py

      - name: Commit portfolio log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add portfolio_log.csv
          git commit -m "update portfolio log" || echo "no changes"
          git push